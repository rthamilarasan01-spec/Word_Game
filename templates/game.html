<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Interface</title>
    <script>
        document.addEventListener('keydown', (event)=> {
            if (event.key == 'Enter'){
                sendAnswer()
            }
        })
        function sendAnswer()
        {
            let check_input = document.getElementById('answer').value;
            if (check_input.trim()!=''){
            let count = document.getElementById('count').innerText;
            let score = document.getElementById('score').innerText;
            let answer = document.getElementById('answer').value;
            let level = document.getElementById('level').innerText;
            let word = document.getElementById('hidden').innerText;

            fetch('/update', {
                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({
                    count:count,
                    score:score,
                    answer:answer,
                    level:level,
                    exp:word
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('count').innerText = data.new_count;
                document.getElementById('score').innerText = data.new_score;
                document.getElementById('status').innerText = data.status;
                document.getElementById('exp').innerText = data.new_exp;
                document.getElementById('hidden').innerText = data.word;
            })
            document.getElementById('answer').value = ''
            document.getElementById('label').innerText = 'Next>>'
        }
        }
        function scoreCard()
        {
            let score = document.getElementById('score').innerText;
            let count = document.getElementById('count').innerText;
            let time = document.getElementById('timer').innerText;
            let level = document.getElementById('level').innerText;
            let player = document.getElementById('player').innerText;

            fetch('/score_card', {

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({
                    score:score,
                    time:time,
                    count:count,
                    level:level,
                    player:player
                })
            })
            .then(response => response.text())
            .then(html => {

        document.open();
        document.write(html);
        document.close();
                
        });
    }

        let seconds = 0;
        let minutes = 0;
        let hours = 0;

    function time()
    {
        seconds +=1;
        if (seconds == 60)
        {
            seconds = 0;
            minutes += 1;
        }
        if (minutes == 60)
        {
            seconds = 0;
            hours += 1;
        }
        document.getElementById('timer').innerText = `${hours}:${minutes}:${seconds}`;
    }

    setInterval(time,1000)

        function goBack()
        {
            window.history.back();
        }

    </script>
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .game-window{
            width:90%;
            max-width:1100px;
            height:90vh;
            background:rgba(255,255,255,0.08);
            border-radius:20px;
            padding:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 0 20px rgba(0,0,0,0.5);

            display:flex;
            flex-direction:column;
        }

        /* Top Bar */

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            color:white;
        }

        .stats{
            display:flex;
            gap:20px;
            font-size:18px;
            font-weight:bold;
        }

        .stat-box{
            background:rgba(255,255,255,0.1);
            padding:12px 18px;
            border-radius:12px;
        }

        /* Center Display */

        .game-display{
            flex: 1;
            background:#111;
            border-radius:20px;
            display:flex;
            flex-direction: column;
            justify-content:center;
            gap: 30px;
            align-items:center;
            color:white;
            font-size:40px;
            border:4px solid rgba(255,255,255,0.1);
            margin-bottom:20px;
        }

        /* Bottom Buttons */

        .bottom-bar{
            display:flex;
            justify-content:center;
            gap:20px;
        }

        .btn{
            padding:15px 35px;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .end-btn{
            background:#ff9800;
            color:white;
        }

        .exit-btn{
            background:#e53935;
            color:white;
        }

        .btn:hover{
            transform:scale(1.05);
            opacity:0.9;
        }

        @media screen and (max-width:768px){

    body{
        padding:10px;
        height:auto;
        min-height:100vh;
    }

    .game-window{

        width:100%;
        height:auto;

        padding:15px;
    }

    .top-bar{

        flex-direction:column;
        gap:15px;
    }

    .stats{

        width:100%;

        display:grid;

        grid-template-columns:1fr 1fr;

        gap:10px;
    }

    .stat-box{

        font-size:14px;

        padding:10px;
    }

    .game-display{

        font-size:28px;

        padding:20px;

        gap:20px;
    }

    #exp{

        word-break:break-word;

        text-align:center;
    }

    #answer{

        width:100% !important;

        max-width:200px;
    }

    .bottom-bar{

        flex-direction:column;
    }

    .btn{

        width:100%;

        padding:12px;

        font-size:16px;
    }
}

    </style>
</head>

<body>

    <div class="game-window">

        <!-- Top Section -->

        <div class="top-bar">

            <div class="stats">

                <div class="stat-box">
                    ⏱ Timer: <div id="timer">0</div>
                </div>

                <div class="stat-box">
                    ⭐ Question: <div id="count">0</div>
                </div>

                <div class="stat-box">
                    🎯 Points: <div id="score">0</div>
                </div>

                <div class="stat-box">
                    🎮 Level: <div id="level">{{level}}</div>
                </div>

                <div class="stat-box">
                    👤 Player: <div id="player">{{player}}</div>
                </div>

                <div id="hidden" style="display: none;">{{word}}</div>

            </div>

        </div>

        <!-- Center Display -->

        <div class="game-display">

            <div style="color: white; font-style: italic; font-size: small;">Guess The Word (Hint: Computer & Programming)</div>

            <div id="exp">{{exp}}</div>

            <div class="answer" style="display: flex; flex-direction: column;">
                <label for="" id="label" style="font-size: 18px; text-align: center;"></label>
                <input type="text" id="answer" style="border: ipx solid red; border-radius: 10px; padding: 10px; width: 100px;" placeholder="??">
            </div>

            <button onclick="sendAnswer()" class="btn enter-btn" style="background: rgb(125, 125, 38); color: white;">Enter</button>

            <div id="status"></div>

        </div>

        <!-- Bottom Buttons -->

        <div class="bottom-bar">

            <button class="btn end-btn" onclick="scoreCard()">
                END GAME
            </button>

            <button class="btn exit-btn" onclick="goBack()">
                EXIT
            </button>

        </div>

    </div>

</body>
</html>
