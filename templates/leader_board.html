<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px 0;
            background:linear-gradient(135deg,#141e30,#243b55);
        }

        .leaderboard-container{

            width:90%;
            max-width:850px;

            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);

            border-radius:20px;

            padding:30px;

            box-shadow:0 0 20px rgba(0,0,0,0.5);

        }

        .title{

            text-align:center;
            color:white;

            font-size:38px;
            letter-spacing:2px;

            margin-bottom:30px;

        }

        .table-header,
        .player-row{

            display:grid;
            grid-template-columns:1fr 2fr 2fr 2fr 2fr;

            align-items:center;

            padding:18px 20px;

            border-radius:12px;

            margin-bottom:15px;

        }

        .table-header{

            background:#00bcd4;
            color:white;

            font-size:20px;
            font-weight:bold;

        }

        .player-row{

            background:rgba(255,255,255,0.08);

            color:white;

            font-size:18px;

            transition:0.3s;

        }

        .player-row:hover{

            transform:scale(1.02);
            background:rgba(255,255,255,0.15);

        }

        .rank{

            font-weight:bold;
            color:#ffd700;

        }

        .score{

            color:#00e5ff;
            font-weight:bold;

        }

        .back-btn{

            width:30%;
            margin-top:25px;
            margin-left: 35%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#e53935;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .back-btn:hover{

            transform:scale(1.03);
            opacity:0.9;

        }

/* Mobile Responsive Design */

@media screen and (max-width:768px){

    .leaderboard-container{
        width:95%;
        padding:20px;
    }

    .title{
        font-size:28px;
    }

    /* Hide Header */
    .table-header{
        display:none;
    }

    /* Player Card */

    .player-row{

        display:flex;
        flex-direction:column;

        gap:15px;

        padding:20px;

        border-radius:15px;

        background:rgba(255,255,255,0.12);

    }

    /* Individual Blocks */

    .player-row div{

        width:100%;

        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:12px 15px;

        border-radius:10px;

        background:rgba(255,255,255,0.08);

    }

    /* Labels */

    .player-row div:nth-child(1)::before{
        content:"Rank";
        font-weight:bold;
        color:#00e5ff;
    }

    .player-row div:nth-child(2)::before{
        content:"Player";
        font-weight:bold;
        color:#00e5ff;
    }

    .player-row div:nth-child(3)::before{
        content:"High Score";
        font-weight:bold;
        color:#00e5ff;
    }

    .player-row div:nth-child(4)::before{
        content:"Average";
        font-weight:bold;
        color:#00e5ff;
    }

    .player-row div:nth-child(5)::before{
        content:"Time";
        font-weight:bold;
        color:#00e5ff;
    }

    .back-btn{

        width:100%;
        margin-left:0;

        font-size:16px;

    }

}

    </style>

</head>

<body>

    <div class="leaderboard-container">

        <h1 class="title">
            🏆 LEADERBOARD
        </h1>

        <!-- Table Header -->

        <div class="table-header">

            <div>Rank</div>
            <div>Player Name</div>
            <div>High Score</div>
            <div>Average</div>
            <div>Time</div>

        </div>

        <!-- Player Details -->

        {% for i in leader_board %}
        <div class="player-row">

            <div class="rank">{{i.rank}}</div>
            <div>{{i.player_id}}</div>
            <div class="score">{{i.score}}</div>
            <div>{{i.average}}</div>
            <div>{{i.time}}</div>

        </div>
        {% endfor %}

        

        <!-- Back Button -->

        <button class="back-btn" onclick="goBack()">
            BACK
        </button>

    </div>

    <script>

        function goBack()
        {
            window.history.back();
        }

    </script>

</body>
</html>
